<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metronome</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#0f172a;min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}
.metro{background:#1e293b;padding:30px;border-radius:20px;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,0.3);width:300px}
.circle{width:120px;height:120px;border-radius:50%;background:#334155;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:bold;transition:background 0.1s,border 0.1s}
.circle.beat{background:#f59e0b;box-shadow:0 0 20px #f59e0b}
.bpm{font-size:14px;color:#94a3b8;margin-bottom:10px}
input[type=range]{width:100%;accent-color:#f59e0b;margin:10px 0}
.controls{display:flex;gap:10px;margin-top:15px}
button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;color:white}
.start{background:#10b981}
.stop{background:#ef4444}
button:hover{opacity:0.9}
</style>
</head>
<body>
<div class="metro">
  <h2>🎵 Metronome</h2>
  <div class="circle" id="circle">0</div>
  <div class="bpm">BPM: <span id="bpmVal">120</span></div>
  <input type="range" id="bpm" min="40" max="240" value="120" oninput="updateBPM(this.value)">
  <div class="controls">
    <button class="start" id="startBtn" onclick="start()">▶ Boshlash</button>
    <button class="stop" onclick="stop()">⏹ To'xtatish</button>
  </div>
</div>
<script>
let ctx,beat=0,timer=null,isRunning=false;
function updateBPM(v){document.getElementById('bpmVal').textContent=v}
function playClick(){
  const osc=ctx.createOscillator(),gain=ctx.createGain();
  osc.connect(gain);gain.connect(ctx.destination);
  osc.frequency.value=beat%4===0?1000:800;
  gain.gain.setValueAtTime(0.5,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.05);
  osc.start();osc.stop(ctx.currentTime+0.05);
}
function tick(){
  playClick();
  const c=document.getElementById('circle');
  c.textContent=(beat%4)+1;
  c.classList.add('beat');
  setTimeout(()=>c.classList.remove('beat'),100);
  beat++;
}
function start(){
  if(isRunning)return;isRunning=true;
  ctx=new(window.AudioContext||window.webkitAudioContext)();
  document.getElementById('startBtn').disabled=true;
  const bpm=parseInt(document.getElementById('bpm').value);
  timer=setInterval(tick,60000/bpm);
}
function stop(){
  isRunning=false;clearInterval(timer);beat=0;
  document.getElementById('circle').textContent='0';
  document.getElementById('startBtn').disabled=false;
}
</script>
</body>
</html>
